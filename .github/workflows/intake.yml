name: Task Intake (Telegram)

on:
  schedule:
    - cron: "*/5 * * * *"   # каждые 5 минут опрашиваем бота
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: task-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install --quiet groq
      - name: Run intake
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
        run: python intake.py
      - name: Persist offset
        run: |
          git config user.name "trello-sync-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet tg_offset.json; then
            git add tg_offset.json
            git commit -m "chore: update telegram offset [skip ci]"
            git push
          else
            echo "offset не изменился"
          fi
      - name: Alert on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=🔴 Сбой: ${{ github.workflow }} упал. Actions → ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
