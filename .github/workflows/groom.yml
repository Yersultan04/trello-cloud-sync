name: Board Groom

on:
  schedule:
    - cron: "0 6 * * *"   # ежедневно 06:00 UTC (11:00 GMT+5)
  workflow_dispatch:

jobs:
  groom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run groom
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
        run: python groom.py
